version: '3.9'

services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: asisya-sql
    environment:
      SA_PASSWORD: "Your_password123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"

  api:
    build:
      context: .
      dockerfile: Asisya.Api/Dockerfile
    container_name: asisya-api
    ports:
      - "8080:8080"
    depends_on:
      - sqlserver
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=AsisyaProdDB;User Id=sa;Password=Your_password123;TrustServerCertificate=True;"
      Jwt__Key: "super_secret_key_123"
      Jwt__Issuer: "AsisyaApi"
      Jwt__Audience: "AsisyaClient"